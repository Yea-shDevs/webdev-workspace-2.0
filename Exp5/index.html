<!DOCTYPE html>
<html>
<head>
<title>Employee Salary Management Form</title>

<style>

body{
    font-family: Arial;
    background-color: #f2f2f2;
}

.container{
    width: 400px;   
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px gray;  
}

h2{
    text-align: center;
}

input, select{
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button{
    width: 100%;
    padding: 10px;
    background-color: green;
    color: white;
    border: none;
    font-size: 16px;
}

button:hover{
    background-color: darkgreen;
}

table{
    width: 80%;
    margin: 30px auto;
    border-collapse: collapse;
    background: white;
}

th, td{
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}

th{
    background-color: #4CAF50;
    color: white;
}

</style>
</head>

<body>

<div class="container">

<h2>Employee Salary Management</h2>

<form id="employeeForm">

<label>Employee Name</label>
<input type="text" id="name" placeholder="Enter Employee Name" required>
<label>Employee ID</label>
<input type="text" id="name" placeholder="Enter Employee ID" required>

<label>Branch</label>
<select id="branch">
<option>Artificial Intelligence and Machine Learning</option>
<option>Electrical Engineering</option>
<option>Cybersecurity</option>
<option>IT Department</option>
</select>

<label>Salary</label>
<input type="number" id="salary" placeholder="Enter Salary" required>

<button type="submit">Add Employee</button>

</form>

</div>

<table id="employeeTable">
<tr>
<th>Name</th>
<th>Branch</th>
<th>Salary</th>
</tr>
</table>

<script>

document.getElementById("employeeForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let branch = document.getElementById("branch").value;
let salary = document.getElementById("salary").value;

let table = document.getElementById("employeeTable");

let newRow = table.insertRow();

let cell1 = newRow.insertCell(0);
let cell2 = newRow.insertCell(1);
let cell3 = newRow.insertCell(2);

cell1.innerHTML = name;
cell2.innerHTML = branch;
cell3.innerHTML = salary;

document.getElementById("employeeForm").reset();

});

</script>

</body>
</html>
